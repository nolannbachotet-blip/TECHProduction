    <img src="img/logo the virus.png" class="slide">
</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
    const next = (current + 1) % slides.length;

    slides[current].classList.remove('active');
    slides[current].classList.add('leave');

    slides[next].classList.add('active');

    setTimeout(() => {
        slides[current].classList.remove('leave');
    }, 1000);

    current = next;
}, 6000);
</script>
