<h2>THE VIRUS</h2>
<p>SYNOPSIS</p>

<div class="zone-slider">
    <div class="container">
        <img src="img/the virus site.png" class="slide active">
        <img src="img/logo the virus.png" class="slide">
    </div>

    <div class="logo-cote">
        <img src="img/logo TECHProduction.png" alt="Logo TECHProduction">
    </div>
</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
    const next = (current + 1) % slides.length;

    slides[current].classList.remove('active');
    slides[current].classList.add('leave');

    slides[next].classList.add('active');

    setTimeout(() => {
        slides[current].classList.remove('leave');
    }, 1000);

    current = next;
}, 15000);
</script>
